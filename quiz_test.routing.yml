# Only custom routes that are NOT auto-generated by AdminHtmlRouteProvider.
# Entity CRUD routes (collection, add-form, edit-form, delete-form)
# are auto-generated from the QuizTest entity annotation's "links" section.

quiz_test.question_list:
  path: '/admin/quiz-test/{quiz_test}/questions'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::questionList'
    _title: 'Вопросы'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.question_add:
  path: '/admin/quiz-test/{quiz_test}/questions/add'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::questionAdd'
    _title: 'Добавить вопрос'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.question_edit:
  path: '/admin/quiz-test/{quiz_test}/questions/{quiz_test_question}/edit'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::questionEdit'
    _title: 'Редактирование вопроса'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.question_delete:
  path: '/admin/quiz-test/{quiz_test}/questions/{quiz_test_question}/delete'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::questionDelete'
    _title: 'Удаление вопроса'
  requirements:
    _permission: 'administer quiz tests'

# --- Open questions (optional second part) ---

quiz_test.open_question_list:
  path: '/admin/quiz-test/{quiz_test}/open-questions'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::openQuestionList'
    _title: 'Открытые вопросы'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.open_question_add:
  path: '/admin/quiz-test/{quiz_test}/open-questions/add'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::openQuestionAdd'
    _title: 'Добавить открытый вопрос'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.open_question_edit:
  path: '/admin/quiz-test/{quiz_test}/open-questions/{quiz_test_open_question}/edit'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::openQuestionEdit'
    _title: 'Редактирование открытого вопроса'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.open_question_delete:
  path: '/admin/quiz-test/{quiz_test}/open-questions/{quiz_test_open_question}/delete'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::openQuestionDelete'
    _title: 'Удаление открытого вопроса'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.settings:
  path: '/admin/config/quiz-test/settings'
  defaults:
    _form: '\Drupal\quiz_test\Form\QuizTestSettingsForm'
    _title: 'Настройки тестирования'
  requirements:
    _permission: 'administer quiz tests'

quiz_test.take_test:
  path: '/quiz-test/{quiz_test}'
  defaults:
    _controller: '\Drupal\quiz_test\Controller\QuizTestController::takeTest'
    _title_callback: '\Drupal\quiz_test\Controller\QuizTestController::testTitle'
  requirements:
    _custom_access: '\Drupal\quiz_test\Controller\QuizTestController::accessTakeTest'
